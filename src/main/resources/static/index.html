<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeStep — Portal</title>

    <!-- PWA META TAGS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="css/style.css">
    <script src="js/i18n.js"></script>
    <style>
        /* ── Language Switcher ── */
        .lang-switcher {
            position: fixed;
            top: 14px;
            right: 16px;
            z-index: 100000;
            display: flex;
            align-items: center;
            gap: 1px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 999px;
            padding: 3px 5px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .lang-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.35);
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 0.6px;
            cursor: pointer;
            padding: 4px 9px;
            border-radius: 999px;
            transition: color 0.2s ease, background 0.2s ease, text-shadow 0.2s ease;
            line-height: 1;
        }
        .lang-btn.active {
            background: rgba(0, 220, 255, 0.13);
            color: #00dcff;
            text-shadow: 0 0 8px rgba(0, 220, 255, 0.55);
        }
        .lang-btn:hover:not(.active) { color: rgba(255,255,255,0.70); }
        .lang-divider {
            color: rgba(255,255,255,0.18);
            font-size: 0.65rem;
            pointer-events: none;
            user-select: none;
        }

        /* ══════════════════════════════════════════════════════════════
           GLOBAL BACKGROUND
        ══════════════════════════════════════════════════════════════ */
        body.portal {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            background: radial-gradient(circle at center, #0d0d22 0%, #070712 100%);
            overflow-x: hidden;
            position: relative;
        }

        body.portal::before,
        body.portal::after {
            content: "";
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(90px);
        }
        body.portal::before {
            width: 520px;
            height: 520px;
            top: -120px;
            left: -140px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.18) 0%, transparent 70%);
            animation: orbPulse 7s ease-in-out infinite alternate;
        }
        body.portal::after {
            width: 480px;
            height: 480px;
            bottom: -100px;
            right: -120px;
            background: radial-gradient(circle, rgba(0, 220, 255, 0.14) 0%, transparent 70%);
            animation: orbPulse 9s 1.5s ease-in-out infinite alternate;
        }
        @keyframes orbPulse {
            from { opacity: 0.55; transform: scale(1);   }
            to   { opacity: 1;    transform: scale(1.18); }
        }
        .orb-mid {
            position: fixed;
            width: 340px;
            height: 340px;
            top: 38%;
            right: 15%;
            background: radial-gradient(circle, rgba(106, 0, 255, 0.10) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(70px);
            pointer-events: none;
            z-index: 0;
            animation: orbPulse 11s 3s ease-in-out infinite alternate;
        }

        /* ══════════════════════════════════════════════════════════════
           SPLASH SCREEN
        ══════════════════════════════════════════════════════════════ */
        #splash-screen {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: radial-gradient(circle at center, #0d0d22 0%, #070712 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: opacity 0.6s ease;
        }
        #splash-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* Compass — splash */
        .compass-wrap {
            position: relative;
            width: 110px;
            height: 110px;
            animation: compassSpin 2s ease-out both;
        }
        @keyframes compassSpin {
            from { transform: rotate(-360deg) scale(0.6); opacity: 0; }
            to   { transform: rotate(0deg)   scale(1);   opacity: 1; }
        }
        .compass-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid transparent;
            background: linear-gradient(#070712, #070712) padding-box,
                        linear-gradient(135deg, #8a2be2, #00ffff, #8a2be2) border-box;
            box-shadow: 0 0 28px rgba(0, 220, 255, 0.45), 0 0 56px rgba(138, 43, 226, 0.30),
                        inset 0 0 18px rgba(0, 220, 255, 0.06);
        }
        .compass-ring-outer {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1px solid rgba(0, 220, 255, 0.18);
            animation: ringRotate 12s linear infinite;
        }
        .compass-ring-outer::before,
        .compass-ring-outer::after {
            content: "";
            position: absolute;
            width: 6px;
            height: 6px;
            background: #00dcff;
            border-radius: 50%;
            box-shadow: 0 0 8px #00dcff;
            top: 50%;
            left: -3px;
            transform: translateY(-50%);
        }
        .compass-ring-outer::after {
            left: auto;
            right: -3px;
        }
        @keyframes ringRotate {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        .compass-needle {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: needleSwing 2.2s 0.5s ease-out both;
        }
        @keyframes needleSwing {
            0%   { transform: rotate(180deg); }
            60%  { transform: rotate(-20deg); }
            80%  { transform: rotate(12deg);  }
            100% { transform: rotate(0deg);   }
        }
        .needle-shaft {
            position: relative;
            width: 6px;
            height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .needle-north {
            flex: 1;
            width: 6px;
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            background: linear-gradient(180deg, #ff3a3a, #ff6060);
            box-shadow: 0 0 12px rgba(255, 60, 60, 0.7);
        }
        .needle-south {
            flex: 1;
            width: 6px;
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
            background: linear-gradient(180deg, #00dcff, #0099cc);
            box-shadow: 0 0 12px rgba(0, 220, 255, 0.7);
        }
        .needle-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.9);
            z-index: 2;
        }
        .compass-label {
            position: absolute;
            font-size: 0.62rem;
            font-weight: 900;
            letter-spacing: 1px;
            color: rgba(0, 220, 255, 0.75);
        }
        .compass-label.n { top:  6px; left: 50%; transform: translateX(-50%); }
        .compass-label.s { bottom: 6px; left: 50%; transform: translateX(-50%); }
        .compass-label.e { right: 6px; top: 50%; transform: translateY(-50%); }
        .compass-label.w { left:  6px; top: 50%; transform: translateY(-50%); }

        .splash-title {
            font-weight: 900;
            font-size: clamp(2.8rem, 9vw, 4.8rem);
            letter-spacing: 0.06em;
            background: linear-gradient(90deg, #8a2be2, #00ffff, #00ff99);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.4))
                    drop-shadow(0 0 40px rgba(138, 43, 226, 0.30));
            animation: splashTitleIn 0.7s 0.2s ease both,
                       splashPulse   2s   0.9s ease-in-out infinite alternate;
        }
        @keyframes splashTitleIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0);    }
        }
        @keyframes splashPulse {
            from { filter: drop-shadow(0 0 12px rgba(0,255,255,0.25)) drop-shadow(0 0 24px rgba(138,43,226,0.20)); }
            to   { filter: drop-shadow(0 0 32px rgba(0,255,255,0.60)) drop-shadow(0 0 56px rgba(138,43,226,0.48)); }
        }
        .splash-tagline {
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.35);
            animation: splashTitleIn 0.7s 0.4s ease both;
        }

        /* ══════════════════════════════════════════════════════════════
           PORTAL
        ══════════════════════════════════════════════════════════════ */
        #portal-content {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.55s ease, transform 0.55s ease;
            width: 100%;
            position: relative;
            z-index: 2;
        }
        #portal-content.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .portal-shell {
            width: min(980px, 100%);
            margin: 0 auto;
        }

        /* ── Portal Compass Hero ── */
        .portal-hero {
            text-align: center;
            margin-bottom: 32px;
        }
        .portal-compass-wrap {
            position: relative;
            width: 164px;
            height: 164px;
            margin: 0 auto 24px;
        }
        .portal-compass-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid transparent;
            background: linear-gradient(#070712, #070712) padding-box,
                        linear-gradient(135deg, #8a2be2, #00ffff, #8a2be2) border-box;
            box-shadow: 0 0 32px rgba(0, 220, 255, 0.35),
                        0 0 64px rgba(138, 43, 226, 0.22),
                        inset 0 0 24px rgba(0, 220, 255, 0.05);
        }
        .portal-compass-outer {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 1px solid rgba(0, 220, 255, 0.15);
            animation: ringRotate 16s linear infinite;
        }
        .portal-compass-outer::before,
        .portal-compass-outer::after {
            content: "";
            position: absolute;
            width: 5px;
            height: 5px;
            background: #00dcff;
            border-radius: 50%;
            box-shadow: 0 0 7px #00dcff;
            top: 50%;
            left: -2.5px;
            transform: translateY(-50%);
        }
        .portal-compass-outer::after {
            left: auto;
            right: -2.5px;
        }
        /* Tick marks on the outer ring */
        .portal-compass-ticks {
            position: absolute;
            inset: -18px;
            border-radius: 50%;
            animation: ringRotate 32s linear infinite reverse;
        }
        .portal-compass-ticks::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px dashed rgba(138, 43, 226, 0.12);
        }
        /* Cardinal labels */
        .portal-compass-label {
            position: absolute;
            font-size: 0.58rem;
            font-weight: 900;
            letter-spacing: 1px;
            color: rgba(0, 220, 255, 0.55);
        }
        .portal-compass-label.n { top:  10px; left: 50%; transform: translateX(-50%); }
        .portal-compass-label.s { bottom: 10px; left: 50%; transform: translateX(-50%); }
        .portal-compass-label.e { right: 10px; top: 50%; transform: translateY(-50%); }
        .portal-compass-label.w { left:  10px; top: 50%; transform: translateY(-50%); }
        /* Logo text inside compass */
        .portal-compass-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 2px;
        }
        .portal-compass-logo {
            font-size: 1.18rem;
            font-weight: 900;
            letter-spacing: 0.12em;
            background: linear-gradient(90deg, #00e5ff, #b388ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 8px rgba(0, 220, 255, 0.55))
                    drop-shadow(0 0 18px rgba(138, 43, 226, 0.35));
            line-height: 1;
        }
        .portal-compass-sub {
            font-size: 0.42rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: rgba(0, 220, 255, 0.45);
            text-transform: uppercase;
        }

        /* ── Role Selection Grid ── */
        .role-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }
        .role-card {
            position: relative;
            border-radius: 18px;
            background: rgba(12, 12, 26, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.55),
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
                        border-color 0.28s ease,
                        box-shadow 0.28s ease;
            padding: 28px 26px 26px;
            min-height: 190px;
        }
        .role-card::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.28s ease;
        }
        .role-card.parent::before {
            background: radial-gradient(ellipse at 30% 0%, rgba(59,130,246,0.14) 0%, transparent 65%);
        }
        .role-card.child::before {
            background: radial-gradient(ellipse at 70% 0%, rgba(255,130,58,0.12) 0%, transparent 65%);
        }
        .role-card:hover {
            transform: translateY(-5px) scale(1.015);
            box-shadow: 0 28px 80px rgba(0, 0, 0, 0.70);
        }
        .role-card.parent:hover { border-color: rgba(59, 130, 246, 0.32); }
        .role-card.child:hover  { border-color: rgba(255, 130, 58, 0.28); }
        .role-card:hover::before { opacity: 1; }
        .role-card .content { position: relative; z-index: 2; }

        .role-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-weight: 800;
            letter-spacing: 1.2px;
            font-size: 0.68rem;
            text-transform: uppercase;
        }
        .role-card.parent .role-badge {
            background: rgba(59, 130, 246, 0.10);
            border: 1px solid rgba(59, 130, 246, 0.24);
            color: rgba(147, 197, 253, 0.88);
        }
        .role-card.child .role-badge {
            background: rgba(255, 130, 58, 0.10);
            border: 1px solid rgba(255, 130, 58, 0.24);
            color: rgba(253, 186, 116, 0.88);
        }

        .role-heading {
            margin-top: 14px;
            font-size: 1.55rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: -0.01em;
        }

        .role-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 9px 22px;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            cursor: pointer;
            border: none;
            pointer-events: none;
            transition: background 0.2s ease;
        }
        .role-card.parent .role-btn {
            background: rgba(59, 130, 246, 0.16);
            border: 1px solid rgba(59, 130, 246, 0.28);
            color: #93c5fd;
        }
        .role-card.child .role-btn {
            background: rgba(255, 130, 58, 0.14);
            border: 1px solid rgba(255, 130, 58, 0.26);
            color: #fdba74;
        }
        .role-card:hover .role-btn {
            background: rgba(255, 255, 255, 0.08);
        }

        /* ── Footer ── */
        .portal-footer {
            margin-top: 22px;
            text-align: center;
            color: rgba(255,255,255,0.28);
            font-size: 0.72rem;
            letter-spacing: 1.6px;
            font-weight: 600;
        }

        @media (max-width: 860px) {
            .role-grid { grid-template-columns: 1fr; }
        }

        /* Avatar picker overlay removed — child_map.html handles the full setup flow */

    </style>
</head>
<body class="portal">

    <!-- Language Switcher -->
    <div class="lang-switcher" role="group" aria-label="Language">
        <button class="lang-btn active" data-lang="EN" onclick="ssSetLang('EN')">EN</button>
        <span class="lang-divider">|</span>
        <button class="lang-btn" data-lang="RO" onclick="ssSetLang('RO')">RO</button>
    </div>

    <div class="orb-mid"></div>

    <!-- SPLASH SCREEN -->
    <div id="splash-screen">

        <div class="compass-wrap">
            <div class="compass-ring"></div>
            <div class="compass-ring-outer"></div>
            <span class="compass-label n">N</span>
            <span class="compass-label s">S</span>
            <span class="compass-label e">E</span>
            <span class="compass-label w">W</span>
            <div class="compass-needle">
                <div class="needle-shaft">
                    <div class="needle-north"></div>
                    <div class="needle-center"></div>
                    <div class="needle-south"></div>
                </div>
            </div>
        </div>

        <div class="splash-title">SafeStep</div>
        <div class="splash-tagline" data-i18n="portal.tagline">MISSION · SAFETY · ADVENTURE</div>
    </div>

    <!-- PORTAL -->
    <div id="portal-content">
        <div class="portal-shell">

            <!-- Compass Hero -->
            <div class="portal-hero">
                <div class="portal-compass-wrap">
                    <div class="portal-compass-ring"></div>
                    <div class="portal-compass-outer"></div>
                    <div class="portal-compass-ticks"></div>
                    <span class="portal-compass-label n">N</span>
                    <span class="portal-compass-label s">S</span>
                    <span class="portal-compass-label e">E</span>
                    <span class="portal-compass-label w">W</span>
                    <div class="portal-compass-text">
                        <span class="portal-compass-logo">SafeStep</span>
                        <span class="portal-compass-sub" data-i18n="portal.compass.sub">Navigate Safe</span>
                    </div>
                </div>
            </div>

            <!-- Role Cards -->
            <div class="role-grid">

                <div class="role-card parent" onclick="location.href='parent_login.html'">
                    <div class="content">
                        <span class="role-badge" data-i18n="portal.parent.badge">SECURE PORTAL</span>
                        <div class="role-heading" data-i18n="portal.parent.heading">Parent Gateway</div>
                        <div class="role-btn" data-i18n="portal.parent.btn">Access Dashboard</div>
                    </div>
                </div>

                <div class="role-card child" onclick="location.href='child_map.html'">
                    <div class="content">
                        <span class="role-badge" data-i18n="portal.child.badge">LIVE MISSION</span>
                        <div class="role-heading" data-i18n="portal.child.heading">Child Quest</div>
                        <div class="role-btn" data-i18n="portal.child.btn">Select Avatar</div>
                    </div>
                </div>

            </div>

            <div class="portal-footer" data-i18n="portal.footer">SAFE STEP &nbsp;•&nbsp; PREMIUM ECOSYSTEM</div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const splash = document.getElementById('splash-screen');
            const portal = document.getElementById('portal-content');

            setTimeout(() => {
                splash.classList.add('fade-out');
                portal.classList.add('visible');
                setTimeout(() => { splash.style.display = 'none'; }, 620);
            }, 2500);
        });

        // Avatar picker removed — child_map.html handles the complete setup flow:
        // Step 1 (name) → Step 2 (avatar) → Step 3 (pairing code).
    </script>
</body>
</html>
