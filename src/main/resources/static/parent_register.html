<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeStep — Parent Registration</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/i18n.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body.parent-auth {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px;
            background: radial-gradient(900px 650px at 20% 15%, rgba(138,43,226,0.20), transparent 55%),
                        radial-gradient(900px 650px at 85% 20%, rgba(0,255,255,0.13), transparent 55%),
                        radial-gradient(900px 650px at 55% 85%, rgba(0,255,127,0.08), transparent 60%),
                        #070712;
            overflow-x: hidden;
        }
        body.parent-auth::before {
            content: "";
            position: fixed;
            inset: -40%;
            pointer-events: none;
            background: repeating-linear-gradient(
                120deg,
                rgba(0,255,255,0.05) 0px,
                rgba(0,255,255,0.05) 1px,
                transparent 1px,
                transparent 24px
            );
            animation: auth-lines 22s linear infinite;
            opacity: 0.45;
        }
        @keyframes auth-lines {
            0%   { transform: translate3d(-2%, -1%, 0) rotate(0deg); }
            100% { transform: translate3d(2%,  1%, 0) rotate(10deg); }
        }
        .glass-card {
            position: relative;
            z-index: 2;
            width: min(440px, 92vw);
            background: rgba(18, 18, 36, 0.96);
            border: 1px solid rgba(0,255,255,0.14);
            border-radius: 18px;
            padding: 28px 24px;
            box-shadow: 0 26px 80px rgba(0,0,0,0.75);
        }
        .reg-title {
            font-size: 1.65rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: -0.01em;
            margin-bottom: 6px;
        }
        .reg-subtitle {
            color: rgba(255,255,255,0.48);
            font-size: 0.88rem;
            margin-bottom: 22px;
        }
        .back-link-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.45);
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 14px;
            text-decoration: underline;
            transition: color 0.2s ease;
        }
        .back-link-btn:hover { color: rgba(255,255,255,0.80); }
    </style>
</head>
<body class="parent-auth">

    <div class="glass-card">
        <h1 class="reg-title">Create Account</h1>
        <p class="reg-subtitle">Join the SafeStep ecosystem</p>

        <div id="register-form" style="display:flex;flex-direction:column;gap:14px;">
            <input type="email"    id="reg-email" placeholder="Email Address"  autocomplete="email"     required>
            <input type="password" id="reg-pass"  placeholder="Secure Password" autocomplete="new-password" required>
            <input type="text"     id="reg-kid"   placeholder="Child's Name"   autocomplete="off"       required>

            <button class="btn-premium" onclick="processRegister()">CREATE ACCOUNT</button>

            <button class="back-link-btn" onclick="location.href='parent_login.html'">
                Already have an account? Sign in
            </button>
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script>
        const API = window.SAFESTEP_API;

        async function processRegister() {
            const email    = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-pass').value;
            const kidName  = document.getElementById('reg-kid').value.trim();

            if (!email || !password || !kidName) {
                Swal.fire({
                    title: 'Missing Fields',
                    text: 'Please fill in all fields to create your account.',
                    icon: 'warning',
                    background: '#16162a', color: '#fff'
                });
                return;
            }

            try {
                const response = await fetch(`${API}/parent/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, kid_name: kidName })
                });

                if (response.ok) {
                    await Swal.fire({
                        title: 'Account Created',
                        text: 'Your account is ready. You can now sign in.',
                        icon: 'success',
                        background: '#16162a', color: '#fff'
                    });
                    window.location.href = 'parent_login.html';
                } else {
                    const errorMsg = await response.text();
                    Swal.fire({
                        title: 'Registration Failed',
                        text: errorMsg || 'This email may already be in use.',
                        icon: 'error',
                        background: '#16162a', color: '#fff'
                    });
                }
            } catch (error) {
                console.error('Register error:', error);
                Swal.fire({
                    title: 'Server Unreachable',
                    text: 'Make sure the backend server is running.',
                    icon: 'error',
                    background: '#16162a', color: '#fff'
                });
            }
        }
    </script>
</body>
</html>
