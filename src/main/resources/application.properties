spring.application.name=SafeStep

# Render sets PORT automatically; falls back to 8080 for local dev
server.port=${PORT:8080}

# ─── Database ──────────────────────────────────────────────────────────────
# On Render: set SPRING_DATASOURCE_URL to the PostgreSQL connection string.
# Locally (no env var set): falls back to in-memory H2 automatically.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:safestepdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Spring Boot 3.2 / Hibernate 6 auto-detects dialect from the JDBC URL —
# no need to set driver-class-name or database-platform explicitly.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 console disabled in production; safe to enable locally for debugging
spring.h2.console.enabled=false
