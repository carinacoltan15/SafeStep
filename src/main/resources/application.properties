# ── Server ────────────────────────────────────────────────────────────────────
# Render injects PORT automatically; falls back to 8080 for local dev.
server.port=${PORT:8080}
server.address=0.0.0.0

# ── Database ──────────────────────────────────────────────────────────────────
# Locally: values below are used as defaults.
# On Render: set SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD as
#            Environment Variables in the Render dashboard.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/safestep_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin1234}
spring.jpa.hibernate.ddl-auto=update

# ── App ───────────────────────────────────────────────────────────────────────
server.tomcat.max-http-form-post-size=2MB
spring.thymeleaf.cache=false

# ── Frontend path ─────────────────────────────────────────────────────────────
# LOCAL DEV : set to your absolute Windows path, e.g.
#             safestep.frontend.path=C:/Users/carin/Desktop/safestep_frontend
# PRODUCTION : leave blank — Spring Boot serves from classpath:/static/ instead
#             (all HTML/CSS/JS files must be in src/main/resources/static/)
safestep.frontend.path=${FRONTEND_PATH:}